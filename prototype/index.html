<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Dark Mode — Phase 2 Prototype</title>
  <style>
    :root {
      --bg: #0f0f10;
      --panel: #1a1a1c;
      --panel-2: #232327;
      --border: #2d2d33;
      --text: #e8e8ea;
      --text-dim: #8a8a92;
      --accent: #6aa9ff;
      --accent-2: #b894ff;
      --error: #ff6b6b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, "SF Pro Text", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 20px;
      font-size: 14px;
      line-height: 1.5;
    }

    header {
      margin-bottom: 16px;
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .subtitle {
      color: var(--text-dim);
      font-size: 13px;
      margin-top: 4px;
    }

    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      padding: 12px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 16px;
    }

    .controls input[type="file"] {
      flex: 1;
      min-width: 220px;
      padding: 8px 10px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
    }

    .controls select,
    .controls button {
      padding: 8px 14px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      transition: border-color 0.15s, background 0.15s;
    }

    .controls button:hover:not(:disabled),
    .controls select:hover {
      background: #2a2a2f;
      border-color: #3d3d44;
    }

    .controls button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .zoom-group {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 2px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 6px;
    }

    .zoom-group button {
      border: none;
      background: transparent;
      padding: 6px 8px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
    }

    .zoom-group button:hover:not(:disabled) {
      background: #2f2f35;
      border-color: transparent;
    }

    .zoom-group button svg {
      display: block;
    }

    .zoom-group .zoom-level {
      font-variant-numeric: tabular-nums;
      font-size: 12px;
      min-width: 48px;
      padding: 6px 4px;
      text-align: center;
      color: var(--text-dim);
    }

    .zoom-group .zoom-level:hover:not(:disabled) {
      color: var(--text);
    }

    .page-info {
      color: var(--text-dim);
      font-variant-numeric: tabular-nums;
      font-size: 12px;
      padding: 0 6px;
    }

    .results {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 16px;
    }

    @media (max-width: 1100px) {
      .results { grid-template-columns: 1fr; }
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .panel-header {
      padding: 10px 14px;
      background: var(--panel-2);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-dim);
    }

    .panel-header .label-strong {
      color: var(--text);
      font-weight: 600;
    }

    .panel-header .timing {
      font-family: "SF Mono", "JetBrains Mono", Menlo, monospace;
      color: var(--accent);
      font-size: 11px;
      text-transform: none;
      letter-spacing: 0;
    }

    .panel-header .timing.slow { color: var(--accent-2); }

    .canvas-wrap {
      padding: 14px;
      display: flex;
      justify-content: center;
      overflow: auto;
      max-height: 75vh;
      background:
        linear-gradient(45deg, #18181c 25%, transparent 25%),
        linear-gradient(-45deg, #18181c 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #18181c 75%),
        linear-gradient(-45deg, transparent 75%, #18181c 75%);
      background-size: 16px 16px;
      background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
    }

    canvas {
      display: block;
      border: 1px solid var(--border);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
    }

    .stats {
      padding: 14px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-family: "SF Mono", "JetBrains Mono", Menlo, monospace;
      font-size: 11px;
      color: var(--text-dim);
      white-space: pre-wrap;
      line-height: 1.6;
      max-height: 240px;
      overflow-y: auto;
    }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-dim);
    }

    .empty-state .icon {
      font-size: 32px;
      opacity: 0.3;
      margin-bottom: 12px;
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-left: 8px;
    }
  </style>
</head>
<body>
  <header>
    <h1>PDF Dark Mode <span class="badge">Phase 2 Spike</span></h1>
    <p class="subtitle">pdfjs-dist + vendored doq. Side-by-side baseline vs. dark rendering. Real timings.</p>
  </header>

  <div class="controls">
    <input type="file" id="file" accept="application/pdf">
    <select id="theme">
      <option value="">— Loading themes —</option>
    </select>
    <div class="zoom-group">
      <button id="zoomOut" title="Zoom out" disabled aria-label="Zoom out">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="20" y1="20" x2="16" y2="16"></line>
          <line x1="8" y1="11" x2="14" y2="11"></line>
        </svg>
      </button>
      <button id="zoomLevel" disabled class="zoom-level" title="Reset to 100%">100%</button>
      <button id="zoomIn" title="Zoom in" disabled aria-label="Zoom in">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="20" y1="20" x2="16" y2="16"></line>
          <line x1="11" y1="8" x2="11" y2="14"></line>
          <line x1="8" y1="11" x2="14" y2="11"></line>
        </svg>
      </button>
    </div>
    <button id="prev" disabled>Prev</button>
    <span class="page-info" id="pageInfo">No PDF loaded</span>
    <button id="next" disabled>Next</button>
    <button id="rerender" disabled>Re-render</button>
  </div>

  <div class="results">
    <div class="panel">
      <div class="panel-header">
        <span class="label-strong">Light (baseline)</span>
        <span class="timing" id="timeLight">--</span>
      </div>
      <div class="canvas-wrap" id="wrapLight">
        <div class="empty-state">
          <div class="icon">PDF</div>
          <div>Select a PDF to render</div>
        </div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-header">
        <span class="label-strong">Dark (doq)</span>
        <span class="timing" id="timeDark">--</span>
      </div>
      <div class="canvas-wrap" id="wrapDark">
        <div class="empty-state">
          <div class="icon">DARK</div>
          <div>Select a PDF to render</div>
        </div>
      </div>
    </div>
  </div>

  <pre class="stats" id="stats">Drop a PDF above to begin. Stats and timings will appear here.</pre>

  <script type="importmap">
  {
    "imports": {
      "pdfjs-dist": "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.7.76/build/pdf.min.mjs"
    }
  }
  </script>

  <script type="module">
    import * as pdfjsLib from "pdfjs-dist";
    import doq from "./doq/doq.js";

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.7.76/build/pdf.worker.min.mjs";

    // ─── State ─────────────────────────────────────────────────
    // BASE_SCALE makes "100%" feel like Adobe's "actual size" (comfortable reading),
    // not raw PDF coordinate units (which would be tiny at typical screen DPI).
    // currentScale used in render = displayedZoom × BASE_SCALE.
    const BASE_SCALE = 1.5;
    const ZOOM_LEVELS = [0.5, 0.75, 1, 1.25, 1.5, 2, 2.5, 3];
    const ZOOM_DEFAULT_INDEX = ZOOM_LEVELS.indexOf(1);
    let pdfDoc = null;
    let currentPage = 1;
    let zoomIndex = ZOOM_DEFAULT_INDEX;
    let currentScale = ZOOM_LEVELS[zoomIndex] * BASE_SCALE;
    const statsLines = [];

    // ─── DOM ───────────────────────────────────────────────────
    const els = {
      file: document.getElementById("file"),
      theme: document.getElementById("theme"),
      zoomOut: document.getElementById("zoomOut"),
      zoomIn: document.getElementById("zoomIn"),
      zoomLevel: document.getElementById("zoomLevel"),
      prev: document.getElementById("prev"),
      next: document.getElementById("next"),
      rerender: document.getElementById("rerender"),
      pageInfo: document.getElementById("pageInfo"),
      wrapLight: document.getElementById("wrapLight"),
      wrapDark: document.getElementById("wrapDark"),
      timeLight: document.getElementById("timeLight"),
      timeDark: document.getElementById("timeDark"),
      stats: document.getElementById("stats"),
    };

    function updateZoomDisplay() {
      currentScale = ZOOM_LEVELS[zoomIndex] * BASE_SCALE;
      els.zoomLevel.textContent = `${Math.round(ZOOM_LEVELS[zoomIndex] * 100)}%`;
      els.zoomOut.disabled = !pdfDoc || zoomIndex === 0;
      els.zoomIn.disabled = !pdfDoc || zoomIndex === ZOOM_LEVELS.length - 1;
      els.zoomLevel.disabled = !pdfDoc;
    }
    updateZoomDisplay();

    // ─── Logging ───────────────────────────────────────────────
    function log(msg, level = "info") {
      const ts = new Date().toLocaleTimeString();
      const prefix = level === "ok" ? "[OK]   " : level === "warn" ? "[WARN] " : level === "err" ? "[ERR]  " : "       ";
      const line = `${ts} ${prefix}${msg}`;
      statsLines.push(line);
      if (statsLines.length > 80) statsLines.shift();
      els.stats.textContent = statsLines.join("\n");
      els.stats.scrollTop = els.stats.scrollHeight;
      // Also log to console so Claude in Chrome can read it
      if (level === "err") console.error("[BENCH]", msg);
      else if (level === "warn") console.warn("[BENCH]", msg);
      else console.log("[BENCH]", msg);
    }

    // ─── Init doq ──────────────────────────────────────────────
    let doqReady = false;
    try {
      log("Initializing doq...");
      const t0 = performance.now();
      await doq.init();
      const t1 = performance.now();
      log(`doq.init() OK in ${(t1 - t0).toFixed(1)} ms`, "ok");

      // Load themes for the selector (separate fetch — doq stores them internally
      // but doesn't expose a list API)
      const resp = await fetch("./doq/colors.json");
      const themes = await resp.json();

      els.theme.replaceChildren();
      themes.forEach((scheme, sIdx) => {
        scheme.tones.forEach((tone, tIdx) => {
          const opt = document.createElement("option");
          // Store numeric indices in the value — doq's setTheme(string) parser
          // breaks on multi-word tone names like "Polar Night". Numeric indices
          // hit the array branch instead and work correctly.
          opt.value = `${sIdx},${tIdx}`;
          opt.textContent = `${scheme.name} — ${tone.name}`;
          els.theme.appendChild(opt);
        });
      });

      // Default to first dark-leaning theme
      const darkIdx = Array.from(els.theme.options).findIndex(o => {
        const t = o.textContent.toLowerCase();
        return t.includes("dark") || t.includes("night") || t.includes("polar");
      });
      if (darkIdx >= 0) els.theme.selectedIndex = darkIdx;

      log(`Loaded ${els.theme.options.length} themes`, "ok");
      doqReady = true;
    } catch (e) {
      log(`doq init failed: ${e.message}`, "err");
      console.error(e);
    }

    // ─── File handler ──────────────────────────────────────────
    els.file.addEventListener("change", async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      try {
        log(`Loading "${file.name}" (${(file.size / 1024).toFixed(1)} KB)...`);
        const t0 = performance.now();
        const buf = await file.arrayBuffer();
        const t1 = performance.now();

        pdfDoc = await pdfjsLib.getDocument({ data: buf }).promise;
        const t2 = performance.now();

        log(`File -> ArrayBuffer: ${(t1 - t0).toFixed(1)} ms`);
        log(`Document parse: ${(t2 - t1).toFixed(1)} ms`);
        log(`Pages: ${pdfDoc.numPages}`, "ok");

        currentPage = 1;
        enableNav(true);
        await renderBoth();
      } catch (e) {
        log(`Failed to load PDF: ${e.message}`, "err");
      }
    });

    // ─── Controls ──────────────────────────────────────────────
    els.theme.addEventListener("change", () => { if (pdfDoc) renderBoth(); });
    els.zoomOut.addEventListener("click", () => {
      if (zoomIndex > 0) {
        zoomIndex--;
        updateZoomDisplay();
        if (pdfDoc) renderBoth();
      }
    });
    els.zoomIn.addEventListener("click", () => {
      if (zoomIndex < ZOOM_LEVELS.length - 1) {
        zoomIndex++;
        updateZoomDisplay();
        if (pdfDoc) renderBoth();
      }
    });
    els.zoomLevel.addEventListener("click", () => {
      zoomIndex = ZOOM_LEVELS.indexOf(1);
      updateZoomDisplay();
      if (pdfDoc) renderBoth();
    });
    els.prev.addEventListener("click", () => {
      if (currentPage > 1) { currentPage--; renderBoth(); }
    });
    els.next.addEventListener("click", () => {
      if (pdfDoc && currentPage < pdfDoc.numPages) { currentPage++; renderBoth(); }
    });
    els.rerender.addEventListener("click", () => { if (pdfDoc) renderBoth(); });

    function enableNav(enabled) {
      els.prev.disabled = !enabled;
      els.next.disabled = !enabled;
      els.rerender.disabled = !enabled;
      updateZoomDisplay();
    }

    // ─── Render ────────────────────────────────────────────────
    async function renderBoth() {
      if (!pdfDoc) return;

      els.pageInfo.textContent = `Page ${currentPage} / ${pdfDoc.numPages}`;
      els.timeLight.textContent = "rendering...";
      els.timeDark.textContent = "rendering...";

      const page = await pdfDoc.getPage(currentPage);
      const viewport = page.getViewport({ scale: currentScale });

      // High-DPI: render at viewport × dpr internally, display at viewport CSS px.
      // PDF.js applies the transform to scale up the rasterization while keeping
      // logical coordinates in the viewport's coordinate space.
      const dpr = window.devicePixelRatio || 1;
      const dprTransform = dpr !== 1 ? [dpr, 0, 0, dpr, 0, 0] : null;

      // ─── LIGHT (baseline) ────────────────────────────────────
      // doq is patched onto CanvasRenderingContext2D.prototype globally.
      // Disabling sets engineOn=false; the wrappers early-return and call originals.
      doq.disable();

      const lightCanvas = document.createElement("canvas");
      lightCanvas.width = Math.floor(viewport.width * dpr);
      lightCanvas.height = Math.floor(viewport.height * dpr);
      lightCanvas.style.width = viewport.width + "px";
      lightCanvas.style.height = viewport.height + "px";
      lightCanvas.dataset.cacheId = `light-${currentPage}-${Date.now()}`;
      const lightCtx = lightCanvas.getContext("2d");

      const tL0 = performance.now();
      try {
        await page.render({
          canvasContext: lightCtx,
          viewport,
          transform: dprTransform,
        }).promise;
      } catch (e) {
        log(`Light render failed: ${e.message}`, "err");
        return;
      }
      const tL1 = performance.now();
      const tLight = tL1 - tL0;

      els.wrapLight.replaceChildren(lightCanvas);
      els.timeLight.textContent = `${tLight.toFixed(1)} ms`;
      els.timeLight.classList.remove("slow");

      // ─── DARK (doq enabled) ──────────────────────────────────
      if (!doqReady) {
        log("doq not ready, skipping dark render", "warn");
        return;
      }

      try {
        if (els.theme.value) {
          // Pass numeric indices [schemeIdx, toneIdx] — see comment in theme
          // population for why string passing is broken for multi-word tones.
          const [sIdx, tIdx] = els.theme.value.split(",").map(Number);
          doq.setTheme([sIdx, tIdx]); // also enables
        } else {
          doq.enable();
        }
      } catch (e) {
        log(`doq.setTheme failed: ${e.message}`, "err");
        return;
      }

      const darkCanvas = document.createElement("canvas");
      darkCanvas.width = Math.floor(viewport.width * dpr);
      darkCanvas.height = Math.floor(viewport.height * dpr);
      darkCanvas.style.width = viewport.width + "px";
      darkCanvas.style.height = viewport.height + "px";
      darkCanvas.dataset.cacheId = `dark-${currentPage}-${Date.now()}`;
      const darkCtx = darkCanvas.getContext("2d");

      const tD0 = performance.now();
      try {
        await page.render({
          canvasContext: darkCtx,
          viewport,
          transform: dprTransform,
        }).promise;
      } catch (e) {
        log(`Dark render failed: ${e.message}`, "err");
        doq.disable();
        return;
      }
      const tD1 = performance.now();
      const tDark = tD1 - tD0;

      doq.disable();

      els.wrapDark.replaceChildren(darkCanvas);
      els.timeDark.textContent = `${tDark.toFixed(1)} ms`;

      // Calc overhead and color the dark timing
      const overheadMs = tDark - tLight;
      const overheadPct = (overheadMs / tLight) * 100;
      if (overheadPct > 50) els.timeDark.classList.add("slow");
      else els.timeDark.classList.remove("slow");

      log(
        `Page ${currentPage} @ ${currentScale}x: light ${tLight.toFixed(1)} ms / dark ${tDark.toFixed(1)} ms ` +
        `(overhead +${overheadMs.toFixed(1)} ms, +${overheadPct.toFixed(0)}%)`,
        overheadPct > 100 ? "warn" : "ok"
      );
    }

    log("Prototype ready. Drop a PDF to begin.", "ok");
  </script>
</body>
</html>
